<!doctype html>

  <head>

        🛒

      <div class="card">
        <img src="Giay2.jpg" />

        <button>View details</button>
      </div>

      <div class="card">
        <img src="Giay4.png" />

        <p class="price">$179.99</p>
        <button>View details</button>
      </div>
